<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CLIQUE</title>
    <!--
      Single-Page-App fallback for GitHub Pages (rafgraph/spa-github-pages).
      GitHub Pages serves this file for any unknown path. We encode the
      requested route into a query string and redirect to the app root, where
      the snippet in index.html decodes it back into a clean URL for the router.
      pathSegmentsToKeep = 1 keeps the /Website/ project-page base intact.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
